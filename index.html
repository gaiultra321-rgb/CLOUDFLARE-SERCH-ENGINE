<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Global Search Engine</title>
    <style>
        :root {
            --bg-color: #202124;
            --search-bg: #303134;
            --text-main: #e8eaed;
            --text-link: #8ab4f8;
            --text-snippet: #bdc1c6;
            --text-url: #3c4043;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }
        .header {
            display: flex;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid #3c4043;
            background: #202124;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            margin-right: 20px;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .logo span { color: #4285F4; }
        .search-box-container {
            flex-grow: 1;
            max-width: 600px;
        }
        input {
            width: 100%;
            padding: 12px 20px;
            font-size: 16px;
            background-color: var(--search-bg);
            border: 1px solid transparent;
            border-radius: 24px;
            color: #fff;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            box-shadow: 0 1px 6px rgba(32,33,36,.28);
        }
        .results-container {
            max-width: 650px;
            margin: 30px 20px 20px 160px;
        }
        @media (max-width: 800px) {
            .header { flex-direction: column; align-items: flex-start; }
            .results-container { margin: 20px; }
            .logo { margin-bottom: 10px; }
        }
        .result-item {
            margin-bottom: 30px;
        }
        .result-item .site-url {
            font-size: 12px;
            color: var(--text-snippet);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .result-item a.result-title {
            color: var(--text-link);
            text-decoration: none;
            font-size: 20px;
            display: inline-block;
        }
        .result-item a.result-title:hover {
            text-decoration: underline;
        }
        .result-item .snippet {
            font-size: 14px;
            color: var(--text-snippet);
            line-height: 1.4;
            margin-top: 5px;
        }
        .status-msg {
            color: var(--text-snippet);
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="#" class="logo">V<span>Search</span></a>
        <div class="search-box-container">
            <input type="text" id="search-input" placeholder="Search the web freely..." autocomplete="off">
        </div>
    </div>

    <div class="results-container" id="search-results">
        <div class="status-msg">Type something above and press Enter to search the global web...</div>
    </div>

    <script>
        const searchInput = document.getElementById('search-input');
        const resultsContainer = document.getElementById('search-results');

        searchInput.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value.trim();
                if (!query) return;

                resultsContainer.innerHTML = '<div class="status-msg">Searching global web...</div>';

                try {
                    const response = await fetch(`/search?q=${encodeURIComponent(query)}`);
                    const data = await response.json();

                    if (!data || data.length === 0) {
                        resultsContainer.innerHTML = '<div class="status-msg">No results found on the internet.</div>';
                        return;
                    }

                    resultsContainer.innerHTML = data.map(item => `
                        <div class="result-item">
                            <div class="site-url">${item.url}</div>
                            <a class="result-title" href="${item.url}" target="_blank">${item.title}</a>
                            <div class="snippet">${item.snippet}</div>
                        </div>
                    `).join('');

                } catch (error) {
                    resultsContainer.innerHTML = '<div class="status-msg">Error fetching search results. Try again.</div>';
                    console.error(error);
                }
            }
        });
    </script>
</body>
    </html>
