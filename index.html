<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Anonymous Search & IP Changer</title>
    <style>
        :root {
            --bg-color: #202124;
            --search-bg: #303134;
            --text-main: #e8eaed;
            --text-link: #8ab4f8;
            --text-snippet: #bdc1c6;
        }
        body, html {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            height: 100%;
            overflow-x: hidden;
        }
        .header {
            display: flex;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid #3c4043;
            background: #202124;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            margin-right: 20px;
            text-decoration: none;
            text-transform: uppercase;
        }
        .logo span { color: #4285F4; }
        .search-box-container { flex-grow: 1; max-width: 600px; }
        input {
            width: 100%;
            padding: 12px 20px;
            font-size: 16px;
            background-color: var(--search-bg);
            border: 1px solid transparent;
            border-radius: 24px;
            color: #fff;
            box-sizing: border-box;
        }
        .results-container { max-width: 650px; margin: 30px 20px 20px 160px; }
        @media (max-width: 800px) {
            .header { flex-direction: column; align-items: flex-start; }
            .results-container { margin: 20px; }
        }
        .result-item { margin-bottom: 30px; }
        .result-item .site-url { font-size: 12px; color: var(--text-snippet); margin-bottom: 4px; }
        .result-item a.result-title { color: var(--text-link); text-decoration: none; font-size: 20px; cursor: pointer; }
        .result-item a.result-title:hover { text-decoration: underline; }
        .result-item .snippet { font-size: 14px; color: var(--text-snippet); margin-top: 5px; }
        
        /* ফুল স্ক্রিন ব্রাউজার উইন্ডো */
        #browser-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            z-index: 1000;
            flex-direction: column;
        }
        #browser-bar {
            background: #202124;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            color: #fff;
            border-bottom: 1px solid #3c4043;
            gap: 15px;
        }
        #close-btn {
            background: #ff5f56;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        #change-ip-btn {
            background: #107c41;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        #browser-url { font-size: 13px; color: #bdc1c6; flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        iframe { width: 100%; flex-grow: 1; border: none; background: #fff; }
    </style>
</head>
<body>

    <div id="main-view">
        <div class="header">
            <a href="#" class="logo">V<span>Search</span></a>
            <div class="search-box-container">
                <input type="text" id="search-input" placeholder="Search and browse with rotating IP..." autocomplete="off">
            </div>
        </div>
        <div class="results-container" id="search-results">
            <div>Type and press Enter to search the web anonymously...</div>
        </div>
    </div>

    <div id="browser-container">
        <div id="browser-bar">
            <button id="close-btn" onclick="closeBrowser()">✕ Close</button>
            <button id="change-ip-btn" onclick="rotateIPAndReload()">🔄 Change IP & Reload</button>
            <div id="browser-url">Loading...</div>
        </div>
        <!-- sandbox অপশন আপডেট করা হয়েছে বাটন ও ইনপুট কাজ করার জন্য -->
        <iframe id="web-frame" src="" sandbox="allow-same-origin allow-scripts allow-forms allow-popups"></iframe>
    </div>

    <script>
        const searchInput = document.getElementById('search-input');
        const resultsContainer = document.getElementById('search-results');
        const browserContainer = document.getElementById('browser-container');
        const webFrame = document.getElementById('web-frame');
        const browserUrl = document.getElementById('browser-url');
        
        let currentActiveUrl = "";

        searchInput.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value.trim();
                if (!query) return;

                resultsContainer.innerHTML = '<div>Searching global web...</div>';

                try {
                    const response = await fetch(`/search?q=${encodeURIComponent(query)}`);
                    const data = await response.json();

                    if (!data || data.length === 0) {
                        resultsContainer.innerHTML = '<div>No results found.</div>';
                        return;
                    }

                    resultsContainer.innerHTML = data.map(item => `
                        <div class="result-item">
                            <div class="site-url">${item.url}</div>
                            <a class="result-title" onclick="openInSite('${item.url}')">${item.title}</a>
                            <div class="snippet">${item.snippet}</div>
                        </div>
                    `).join('');

                } catch (error) {
                    resultsContainer.innerHTML = '<div>Error fetching results.</div>';
                }
            }
        });

        function openInSite(url) {
            currentActiveUrl = url;
            browserUrl.innerText = "Proxy URL: " + url;
            webFrame.src = `/search?proxy_url=${encodeURIComponent(url)}`;
            browserContainer.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function rotateIPAndReload() {
            if (!currentActiveUrl) return;
            browserUrl.innerText = "Rotating IP and reloading: " + currentActiveUrl;
            const randomRotationToken = Math.random().toString(36).substring(7);
            webFrame.src = `/search?proxy_url=${encodeURIComponent(currentActiveUrl)}&rotate=true&token=${randomRotationToken}`;
        }

        function closeBrowser() {
            browserContainer.style.display = 'none';
            webFrame.src = "";
            currentActiveUrl = "";
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
